name: Sync Economist Espresso
on:
  schedule:
    - cron: '0 8 * * *'  # 每天北京时间16点自动运行
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone source repo
        run: |
          git clone https://github.com/Monkfishare/Economist_Espresso.git temp-repo

      - name: Copy only new PDF files
        run: |
          find temp-repo -name "*.pdf" -type f | while read file; do
            rel="${file#temp-repo/}"
            mkdir -p "$(dirname "$rel")"
            cp -n "$file" "$rel"
          done
          rm -rf temp-repo

      - name: Commit and push new files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Sync Espresso PDFs $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Get new PDF files
        id: get_pdfs
        run: |
          NEW_FILES=$(git diff HEAD~1 HEAD --name-only 2>/dev/null | grep "\.pdf$" || echo "")
          if [ -z "$NEW_FILES" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
            # Join filenames with comma for attachment
            ATTACHMENTS=$(echo "$NEW_FILES" | tr '\n' ',' | sed 's/,$//')
            echo "attachments=$ATTACHMENTS" >> $GITHUB_OUTPUT
          fi

      - name: Send email via QQ
        if: steps.get_pdfs.outputs.has_new == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Economist Espresso - $(date -u '+%Y-%m-%d')"
          to: ${{ secrets.MAIL_USER }}
          from: ${{ secrets.MAIL_USER }}
          body: "今日新刊已送达，请查收附件。"
          attachments: ${{ steps.get_pdfs.outputs.attachments }}
