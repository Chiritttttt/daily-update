name: Sync Economist Espresso
on:
  schedule:
    - cron: '0 */8 * * *'  # 每8小时运行一次（UTC 0/8/16点），对应北京时间 8/16/0点
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clone source repo
        run: |
          git clone --depth=1 https://github.com/Monkfishare/Economist_Espresso.git temp-repo
      - name: Copy only latest PDF file
        run: |
          LATEST=$(find temp-repo -name "*.pdf" -type f | sort | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No PDF found."
            exit 0
          fi
          rel="${LATEST#temp-repo/}"
          mkdir -p "$(dirname "$rel")"
          cp -n "$LATEST" "$rel"
          echo "Copied: $rel"
          rm -rf temp-repo
      - name: Commit and push new files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Sync Espresso PDFs $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi
      - name: Get new PDF files
        id: get_pdfs
        run: |
          NEW_FILES=$(git diff HEAD~1 HEAD --name-only 2>/dev/null | grep "\.pdf$" || echo "")
          if [ -z "$NEW_FILES" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
            ATTACHMENTS=$(echo "$NEW_FILES" | tr '\n' ',' | sed 's/,$//')
            echo "attachments=$ATTACHMENTS" >> $GITHUB_OUTPUT
          fi
      - name: Send email via QQ
        if: steps.get_pdfs.outputs.has_new == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Economist Espresso - $(date -u '+%Y-%m-%d %H:%M') UTC"
          to: ${{ secrets.MAIL_USER }}
          from: ${{ secrets.MAIL_USER }}
          body: "今日新刊已送达，请查收附件。"
          attachments: ${{ steps.get_pdfs.outputs.attachments }}
